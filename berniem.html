<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bērnu preces | Katalogs bērniem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef9e8 0%, #fdf2e0 100%);
            padding: 2rem;
            color: #4a2e2e;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header stils - bērnu sadaļai */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f5a62320, #ffd69930);
            border-radius: 40px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f39c12, #e67e22, #d35400);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.2rem;
            color: #c0392b;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .category-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Navigācija */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            text-decoration: none;
            background: white;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #2c5a74;
            border: 2px solid #dce5ec;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .nav-btn.active {
            background: #f39c12;
            color: white;
            border-color: #f39c12;
            box-shadow: 0 4px 12px rgba(243, 156, 18, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        /* Produktu režģis */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        /* Produkta karte */
        .product-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffedd5;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(243, 156, 18, 0.2);
        }

        /* Attēla konteiners */
        .product-image-container {
            width: 100%;
            background: linear-gradient(135deg, #fff5e6, #ffe8d4);
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid #fce4b2;
        }

        .product-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.02);
        }

        /* Informācijas daļa */
        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #c0392b;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: #7f8c8d;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #e67e22;
            margin-bottom: 0.3rem;
        }

        .price-unit {
            font-size: 0.9rem;
            font-weight: 500;
            color: #f39c12;
        }

        /* Daudzuma stili */
        .quantity-badge {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            background: #e8f0fe;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            width: fit-content;
            font-weight: 600;
            color: #2c5a74;
        }

        .quantity-in-stock {
            color: #27ae60;
            font-weight: 700;
        }

        .quantity-low {
            color: #e67e22;
            font-weight: 700;
        }

        .quantity-out {
            color: #e74c3c;
            font-weight: 700;
        }

        /* Stāvokļa stili */
        .condition-badge {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            width: fit-content;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .condition-new {
            background: #d5f5e3;
            color: #27ae60;
        }

        .condition-good {
            background: #fef9e7;
            color: #f39c12;
        }

        .condition-used {
            background: #fdedec;
            color: #e74c3c;
        }

        /* Attēla statusa norāde */
        .image-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed #f0e0c0;
            font-size: 0.7rem;
            color: #95a5a6;
        }

        .image-status-icon {
            font-size: 0.85rem;
        }

        .image-hint {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #f39c12;
            background: #fef7e8;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            width: fit-content;
            font-weight: 500;
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            border-top: 1px solid #fce4b2;
            color: #e67e22;
            font-weight: 500;
        }

        /* MODĀLAIS LOGS */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            cursor: pointer;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 94vw;
            max-height: 94vh;
            margin: auto;
            position: relative;
            background: transparent;
            border-radius: 20px;
        }

        .modal-image {
            max-width: 94vw;
            max-height: 94vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: 0.2s;
            background: #2c3e50;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f39c12;
            font-size: 45px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            z-index: 2001;
            font-family: monospace;
        }

        .close-modal:hover {
            color: #e67e22;
            background: rgba(0,0,0,0.9);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .products-grid {
                gap: 1rem;
            }
            .close-modal {
                top: 10px;
                right: 15px;
                font-size: 35px;
                width: 42px;
                height: 42px;
            }
            .product-image {
                width: 100%;
                height: auto;
            }
        }

        @media (max-width: 480px) {
            .product-name {
                font-size: 1.2rem;
            }
            .product-price {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="category-icon">🧸🎈</div>
        <h1>Bērnu Pasaule</h1>
        <p>🌈 Rotaļas, prieks un smaidi mazajiem 🌈</p>
    </div>

    <!-- Navigācija -->
    <div class="nav-links">
        <a href="index.html" class="nav-btn">🏠 Mājai</a>
        <a href="berniem.html" class="nav-btn active">🧸 Bērniem</a>
        <a href="cits.html" class="nav-btn">✨ Cits</a>
    </div>

    <!-- Produktu režģis -->
    <div class="products-grid" id="productsGrid"></div>

    <footer>
        🎠 Katalogs bērniem - priecīgas dienas un smaidošas sejas! 🎠
    </footer>
</div>

<!-- MODĀLAIS LOGS -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <img class="modal-image" id="fullscreenImage" src="" alt="Pilna izmēra bilde">
    </div>
</div>

<script>
    // Bērnu preču dati - ar daudzumu, stāvokli un attēla norādi
    const products = [
        {
            id: 1,
            name: "Lego 71806 Cole Zemes stihijas robots",
            description: "Jauns, neatvērts. 235 detaļas, 2 minifigūras. Netiek ražots.",
            price: 15,
            quantity: 2,           // daudzums noliktavā
            condition: "new",      // stāvoklis: new, good, used
            conditionText: "Jauns, oriģinālā, neatvērtā iepakojumā",
            image: "71806.jpeg",
            fullImage: "71806.jpeg",
            imageNote: "Vairāk foto privāti."
        },
        {
            id: 2,
            name: "Lego 76452 Kalambola aprīkojums profesionāļiem un saldējuma stends",
            description: "Jauns, neatvērts. 795 detaļas, 7 minifigūras.",
            price: 55,
            quantity: 1,
            condition: "new",
            conditionText: "Jauns, oriģinālā, neatvērtā iepakojumā",
            image: "76452.webp",
            fullImage: "76452.webp",
            imageNote: "Vairāk foto privāti."
        },
        {
            id: 3,
            name: "Lego 42603 Zvaigžņu vērotāju kempinga transportlīdzeklis",
            description: "Jauns, neatvērts. 364 detaļas, 2 minifigūras. Netiek ražots.",
            price: 15,
            quantity: 2,
            condition: "new",
            conditionText: "Jauns, oriģinālā, neatvērtā iepakojumā",
            image: "42603.webp",
            fullImage: "42603.webp",
            imageNote: "Vairāk foto privāti."
        },
        {
            id: 4,
            name: "Galda spēle 'Atrodi pāri'",
            description: "Attīsta atmiņu un koncentrēšanos. 24 pāri ar dzīvnieku attēliem.",
            price: 12,
            quantity: 0,           // nav noliktavā
            condition: "good",
            conditionText: "Lietota, visas detaļas klāt",
            image: "galda-spele.png",
            fullImage: "galda-spele.png",
            imageNote: "Reāls produkta foto"
        },
        {
            id: 5,
            name: "Rotaļu virtuve ar piederumiem",
            description: "Komplektā 20 priekšmeti: katli, pannas, dārzeņi un augļi.",
            price: 45,
            quantity: 2,
            condition: "new",
            conditionText: "Jauns, oriģinālā kastē",
            image: "virtuve.png",
            fullImage: "virtuve.png",
            imageNote: "Produkta foto - komplektācija"
        },
        {
            id: 6,
            name: "Bērnu grāmatiņa 'Mazais pūķis'",
            description: "Krāsaini ilustrēts stāsts par draudzību un drosmi. 32 lappuses.",
            price: 10,
            quantity: 6,
            condition: "new",
            conditionText: "Jauna, cietos vākos",
            image: "gramata.png",
            fullImage: "gramata.png",
            imageNote: "Oriģinālais vāka foto"
        },
        {
            id: 7,
            name: "Plastilīna komplekts 24 krāsas",
            description: "Drošs, mīksts plastilīns. Attīsta smalko motoriku.",
            price: 13,
            quantity: 12,
            condition: "new",
            conditionText: "Jauns, oriģinālā iepakojumā",
            image: "plastilins.png",
            fullImage: "plastilins.png",
            imageNote: "Produkta foto - krāsu paraugi"
        },
        {
            id: 8,
            name: "Koka puzle 'Safari dzīvnieki'",
            description: "5 lieli koka gabali. Droša un izturīga apdare.",
            price: 9,
            quantity: 1,           // zems daudzums
            condition: "good",
            conditionText: "Lietota, bet labā kārtībā",
            image: "puzle.png",
            fullImage: "puzle.png",
            imageNote: "Reāls produkta foto"
        },
        {
            id: 9,
            name: "Bērnu mugursoma 'Lapsa'",
            description: "Maza, viegla mugursoma pirmsskolas vecuma bērniem.",
            price: 20,
            quantity: 5,
            condition: "new",
            conditionText: "Jauna, ar oriģinālajām etiķetēm",
            image: "mugursoma.png",
            fullImage: "mugursoma.png",
            imageNote: "Produkta foto - visās pusēs"
        }
    ];

    // Funkcija, kas atgriež daudzuma tekstu ar atbilstošu klasi
    function getQuantityDisplay(quantity) {
        if (quantity <= 0) {
            return '<span class="quantity-out">Nav noliktavā</span>';
        } else if (quantity <= 3) {
            return `<span class="quantity-low">Pēdējie ${quantity} gab.</span>`;
        } else {
            return `<span class="quantity-in-stock">Noliktavā: ${quantity} gab.</span>`;
        }
    }

    // Funkcija, kas atgriež stāvokļa badge ar atbilstošu klasi
    function getConditionDisplay(condition, conditionText) {
        let conditionClass = "";
        let conditionSymbol = "";
        
        switch(condition) {
            case "new":
                conditionClass = "condition-new";
                conditionSymbol = "✨";
                break;
            case "good":
                conditionClass = "condition-good";
                conditionSymbol = "👍";
                break;
            case "used":
                conditionClass = "condition-used";
                conditionSymbol = "📦";
                break;
            default:
                conditionClass = "condition-good";
                conditionSymbol = "📌";
        }
        
        return `<span class="condition-badge ${conditionClass}">${conditionSymbol} ${conditionText}</span>`;
    }

    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('fullscreenImage');
    const closeModalBtn = document.querySelector('.close-modal');

    function openFullImage(imageUrl, productName) {
        if (!imageUrl || imageUrl === "") {
            modalImg.src = "https://placehold.co/1200x800/f39c12/white?text=🧸+Attēls+nav+pieejams";
        } else {
            modalImg.src = imageUrl;
        }
        modalImg.alt = `Pilna izmēra: ${productName || 'Prece'}`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }

    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeModal();
        });
    }
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            closeModal();
        }
    });

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';

            // Attēla konteiners
            const imgContainer = document.createElement('div');
            imgContainer.className = 'product-image-container';
            
            const imgElement = document.createElement('img');
            imgElement.className = 'product-image';
            imgElement.src = product.image;
            imgElement.alt = product.name;
            imgElement.loading = 'lazy';
            imgElement.onerror = () => {
                imgElement.src = 'https://placehold.co/600x400/f39c12/white?text=🧸+Attēls+nav+pieejams';
            };
            imgContainer.appendChild(imgElement);
            
            imgContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                const fullImgUrl = product.fullImage || product.image;
                openFullImage(fullImgUrl, product.name);
            });
            
            // Informācijas daļa
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'product-name';
            nameEl.textContent = product.name;
            
            const descEl = document.createElement('div');
            descEl.className = 'product-description';
            descEl.textContent = product.description;
            
            const priceEl = document.createElement('div');
            priceEl.className = 'product-price';
            priceEl.innerHTML = `${product.price.toFixed(2)} <span class="price-unit">€</span>`;
            
            // Informācijas rinda ar daudzumu un stāvokli
            const infoRow = document.createElement('div');
            infoRow.className = 'info-row';
            infoRow.innerHTML = getQuantityDisplay(product.quantity) + getConditionDisplay(product.condition, product.conditionText);
            
            // Attēla statusa norāde
            const imageStatus = document.createElement('div');
            imageStatus.className = 'image-status';
            imageStatus.innerHTML = `
                <span class="image-status-icon">🖼️</span>
                <span>${product.imageNote || 'Produkta attēls'}</span>
            `;
            
            const hintSpan = document.createElement('div');
            hintSpan.className = 'image-hint';
            hintSpan.innerHTML = '';
            
            infoDiv.appendChild(nameEl);
            infoDiv.appendChild(descEl);
            infoDiv.appendChild(priceEl);
            infoDiv.appendChild(infoRow);
            infoDiv.appendChild(imageStatus);
            infoDiv.appendChild(hintSpan);
            
            card.appendChild(imgContainer);
            card.appendChild(infoDiv);
            
            grid.appendChild(card);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderProducts();
    });
</script>
</body>
</html>
