<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Katalogs - Mājai | Preces mājoklim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
            padding: 2rem;
            color: #1e2a3e;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header stils */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 1rem;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #e67e22, #d35400);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.2rem;
            color: #5a6e7c;
            margin-top: 0.5rem;
        }

        .category-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* Navigācija uz citām lapām - atjaunoti href */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            text-decoration: none;
            background: white;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #2c5a74;
            border: 2px solid #dce5ec;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .nav-btn.active {
            background: #e67e22;
            color: white;
            border-color: #e67e22;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        /* Produktu režģis */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        /* Produkta karte - bilde ir klikšķināma, attēls netiek apgriezts / cropots */
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
        }

        /* Attēla konteiners - MAINĪTS: nav fiksēta augstuma, nav overflow: hidden, nav object-fit: cover.
           Attēls tiek rādīts oriģinālajās proporcijās, tāds kāds tas ir. */
        .product-image-container {
            width: 100%;
            background: #f0f4f8;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Noņemts fixed height un overflow hidden, lai bilde netiktu apgriezta */
        }

        .product-image {
            width: 100%;
            height: auto; /* Saglabā oriģinālās proporcijas */
            display: block;
            pointer-events: none; /* lai klikšķis iet caur konteinerim, bet konteiners noķer notikumu */
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.02);
        }

        /* Informācijas daļa - nav pogu, tikai teksts */
        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: #6b7c8f;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #e67e22;
            margin-bottom: 0.5rem;
        }

        .price-unit {
            font-size: 0.9rem;
            font-weight: 500;
            color: #8ba0b0;
        }

        /* Neliels vizuāls norādījums, ka bilde ir klikšķināma */
        .image-hint {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #e67e22;
            background: #fef3e8;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            width: fit-content;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            border-top: 1px solid #d0dee9;
            color: #7a8e9e;
        }

        /* ---------- MODĀLAIS LOGS (Pilna izmēra bilde / pilnekrāna režīms) ---------- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            cursor: pointer;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 94vw;
            max-height: 94vh;
            margin: auto;
            position: relative;
            background: transparent;
            border-radius: 20px;
        }

        .modal-image {
            max-width: 94vw;
            max-height: 94vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: 0.2s;
            background: #1e2a3e;
        }

        /* Aizvēršanas pogas stilizācija (X) */
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 45px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            z-index: 2001;
            font-family: monospace;
        }

        .close-modal:hover,
        .close-modal:focus {
            color: #e67e22;
            background: rgba(0,0,0,0.9);
            transform: scale(1.05);
        }

        .modal-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            background: transparent;
            pointer-events: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* MOBILĀS IERĪCES - papildus pielāgojumi, attēliem nav augstuma ierobežojumu, tie rādās oriģināli */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .products-grid {
                gap: 1rem;
            }
            .close-modal {
                top: 10px;
                right: 15px;
                font-size: 35px;
                width: 42px;
                height: 42px;
            }
            /* Mobilajām ierīcēm attēla konteiners bez papildus augstuma ierobežojuma, 
               lai bilde paliek oriģinālajā formātā (tāda kāda tā ir) */
            .product-image-container {
                min-height: auto;
            }
            .product-image {
                width: 100%;
                height: auto;
            }
        }

        /* Īpaši maziem ekrāniem - vēl vairāk elastības */
        @media (max-width: 480px) {
            .product-name {
                font-size: 1.2rem;
            }
            .product-price {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="category-icon">🏠</div>
        <h1>Preces Mājai</h1>
        <p></p>
    </div>

    <!-- Navigācija uz citām kategoriju lapām - ATJAUNOTI ĪSTIE href linki -->
    <div class="nav-links">
        <a href="index.html" class="nav-btn active">🏠 Mājai</a>
        <a href="berniem.html" class="nav-btn">🧸 Bērniem</a>
        <a href="cits.html" class="nav-btn">✨ Cits</a>
    </div>

    <!-- Produktu režģis -->
    <div class="products-grid" id="productsGrid"></div>

    <footer>
        <p></p>
    </footer>
</div>

<!-- MODĀLAIS LOGS pilna izmēra / pilnekrāna bildei -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <img class="modal-image" id="fullscreenImage" src="" alt="Pilna izmēra bilde">
    </div>
    <div class="modal-hint"></div>
</div>

<script>
    // Produktu dati - NAV groza pogu, tikai attēli, kuri ir klikšķināmi pilnekrāna skatam.
    // Katram produktam ir "image" (bilde kartītei) un "fullImage" (pilna izmēra versija).
    // Attēli tiks rādīti oriģinālajā formātā (bez crop/zoom), jo CSS ir mainīts.
    const products = [
        {
            id: 1,
            name: "Ariel All in one, 50 pods",
            description: "Katrā iepakojumā 50 kapsulas, pieejami 8 iepakojumi.",
            price: 10,
            image: "ariel.png",
            fullImage: "ariel.png"
        },
        {
            id: 2,
            name: "Finish powerball lemon, 80 tabletes",
            description: "Iepakojumā 80 tabletes, pieejams 1 iepakojums.",
            price: 10,
            image: "finish80lemon.png",
            fullImage: "finish80lemon.png"
        },
        {
            id: 3,
            name: "Finish powerball fresh, 80 tabletes",
            description: "Iepakojumā 80 tabletes, pieejams 1 iepakojums.",
            price: 10,
            image: "finish80fresh.png",
            fullImage: "finish80fresh.png"
        },
        {
            id: 4,
            name: "Somat premium 5in1, 75 tabletes",
            description: "Iepakojumā 75 tabletes, pieejami 2 iepakojumi.",
            price: 11,
            image: "somat5in1.jpg",
            fullImage: "somat5in1.jpg"
        },
        {
            id: 5,
            name: "Somat excellence 3in1, 87 tabletes",
            description: "Iepakojumā 87 tabletes, pieejams 1 iepakojums.",
            price: 11,
            image: "somat5in1.jpg",
            fullImage: "somat5in1.jpg"
        },
        {
            id: 6,
            name: "Somat Gold, 82 tabletes",
            description: "Iepakojumā 82 tabletes, pieejami 3 iepakojumi.",
            price: 10,
            image: "somatgold.jpg",
            fullImage: "somatgold.jpg"
        }
    ];

    // Modal elementu references
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('fullscreenImage');
    const closeModalBtn = document.querySelector('.close-modal');

    // Funkcija, kas atver modālo logu ar norādītā produkta pilna izmēra attēlu (pilnekrāna režīms)
    function openFullImage(imageUrl, productName) {
        if (!imageUrl) {
            modalImg.src = "https://placehold.co/1400x900/e67e22/white?text=Attēls+nav+pieejams";
        } else {
            modalImg.src = imageUrl;
        }
        modalImg.alt = `Pilna izmēra: ${productName || 'Prece'}`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Bloķēt ritināšanu, kamēr bilde atvērta
    }

    // Aizvērt modālo logu
    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = ''; // atjauno ritināšanu
    }

    // Notikumu klausītāji modāļa aizvēršanai
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeModal();
        });
    }
    // Klikšķinot uz fona (modāļa tumšā apgabala) – aizveras
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
    // ESC taustiņš lai aizvērtu
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            closeModal();
        }
    });

    // Funkcija, kas renderē produktus: attēls rādīts oriģinālajā formātā (bez crop, bez fiksēta augstuma),
    // tikai attēls, nosaukums, apraksts, cena. NEKĀDU GROZA POGU. TIKAI ATTĒLS IR KLIKŠĶINĀMS.
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';

            // ATTĒLA KONTEINERS - bez fiksēta augstuma, bez overflow: hidden, lai bilde tiktu rādīta oriģinālā
            const imgContainer = document.createElement('div');
            imgContainer.className = 'product-image-container';
            
            const imgElement = document.createElement('img');
            imgElement.className = 'product-image';
            imgElement.src = product.image;
            imgElement.alt = product.name;
            imgElement.loading = 'lazy';
            // Ja attēls neielādējas, parāda placeholder
            imgElement.onerror = () => {
                imgElement.src = 'https://placehold.co/600x400/e67e22/white?text=Attēls+nav+pieejams';
            };
            imgContainer.appendChild(imgElement);
            
            // Pievienojam klikšķa notikumu TIKAI attēla konteinerim – lai atvērtu pilna izmēra bildi
            imgContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                // Izmantojam fullImage, ja ir pieejams, citādi fallback uz parasto bildi
                const fullImgUrl = product.fullImage || product.image;
                openFullImage(fullImgUrl, product.name);
            });
            
            // Informācijas bloks (bez jebkādām pogām)
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'product-name';
            nameEl.textContent = product.name;
            
            const descEl = document.createElement('div');
            descEl.className = 'product-description';
            descEl.textContent = product.description;
            
            const priceEl = document.createElement('div');
            priceEl.className = 'product-price';
            priceEl.innerHTML = `${product.price.toFixed(2)} <span class="price-unit">€</span>`;
            
            // Neliels vizuāls norādījums, ka bilde ir klikšķināma
            const hintSpan = document.createElement('div');
            hintSpan.className = 'image-hint';
            hintSpan.innerHTML = '';
            
            infoDiv.appendChild(nameEl);
            infoDiv.appendChild(descEl);
            infoDiv.appendChild(priceEl);
            infoDiv.appendChild(hintSpan);
            
            card.appendChild(imgContainer);
            card.appendChild(infoDiv);
            
            grid.appendChild(card);
        });
    }

    // Ielādēt produktus, kad lapa gatava
    document.addEventListener('DOMContentLoaded', () => {
        renderProducts();
    });
    
    // Papildus: nodrošinām, ka visi attēli tiek rādīti oriģinālajā izmērā/attiecībās.
    // CSS jau ir pielāgots: .product-image { width: 100%; height: auto; } un nav fiksēta augstuma konteinerim.
    // Tāpat mobilajās ierīcēs attēli paliek dabiskās proporcijās bez jebkāda crop vai zoom.
</script>
</body>
</html>
